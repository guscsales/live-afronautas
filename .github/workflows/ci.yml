name: CI - Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js 22 (fallback)
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: bun install || npm install

      - name: Check formatting with Biome
        run: npm run format:check

      - name: Run linting with Biome
        run: npm run lint

      - name: Run full Biome check
        run: npm run check

  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js 22 (fallback)
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies with Bun
        run: bun install

      - name: Build project with Bun
        id: bun-build
        run: bun run build
        continue-on-error: true

      - name: Fallback build with TypeScript (if Bun fails)
        if: steps.bun-build.outcome == 'failure'
        run: |
          echo "⚠️ Bun build failed, trying TypeScript compiler..."
          npm install
          npm run build:tsc

      - name: Check if build artifacts exist
        run: |
          if [ -f "dist/server.js" ]; then
            echo "✅ Build successful - dist/server.js created"
            ls -la dist/
          else
            echo "❌ Build failed - dist/server.js not found"
            exit 1
          fi